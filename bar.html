<section class="skills-section">
  <h2>My Skills</h2>

  <div class="skills-container">

    <div class="skill" data-level="4">
      <div class="bar"></div>
      <span>Java</span>
    </div>

    <div class="skill" data-level="3">
      <div class="bar"></div>
      <span>Linux</span>
    </div>

    <div class="skill" data-level="5">
      <div class="bar"></div>
      <span>HTML</span>
    </div>

    <div class="skill" data-level="4">
      <div class="bar"></div>
      <span>CSS</span>
    </div>

    <div class="skill" data-level="3">
      <div class="bar"></div>
      <span>JavaScript</span>
    </div>

  </div>
</section>

<style>
 .skills-container{
  display:flex;
  justify-content:center;
  gap:40px;
  margin-top:40px;
}

.skill{
  width:60px;
  height:220px;
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
  align-items:center;
}

.bar{
  width:100%;
  height:0;
  background:linear-gradient(180deg,#38bdf8,#2563eb);
  border-radius:8px;
  transition:0.4s;
}

.skill span{
  margin-top:10px;
  font-size:14px;
}

.skill:hover .bar{
  background:linear-gradient(180deg,#facc15,#f97316);
  transform:scale(1.08);
}

</style>


<script>const skills = document.querySelectorAll(".skill");

const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {

    if(entry.isIntersecting){

      const level = entry.target.getAttribute("data-level");
      const bar = entry.target.querySelector(".bar");

      const height = level * 40; // 5 levels -> 200px max
      bar.style.height = height + "px";

    }

  });
},{threshold:0.5});

skills.forEach(skill => {
  observer.observe(skill);
});</script>
